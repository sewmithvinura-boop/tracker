<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Canvas Tracker</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, Helvetica, sans-serif;
    }

    body{
      background:#f5f5f5;
      overflow:hidden;
    }

    .toolbar{
      width:85px;
      height:100vh;
      background:white;
      border-right:1px solid #ddd;
      position:fixed;
      left:0;
      top:0;
      display:flex;
      flex-direction:column;
      align-items:center;
      padding-top:20px;
      gap:15px;
      z-index:999;
    }

    .tool-btn{
      width:60px;
      height:60px;
      border:none;
      border-radius:16px;
      background:#efefef;
      cursor:pointer;
      transition:0.2s;
      font-size:12px;
      font-weight:bold;
    }

    .tool-btn:hover{
      background:#ddd;
    }

    .canvas{
      width:calc(100vw - 85px);
      height:100vh;
      margin-left:85px;
      overflow:auto;
      position:relative;

      background-image:
      radial-gradient(#d7d7d7 1px, transparent 1px);

      background-size:20px 20px;
    }

    .board-content{
      position:relative;
      width:5000px;
      height:3000px;
    }

    .back-btn{
      position:fixed;
      top:20px;
      left:110px;
      padding:10px 18px;
      border:none;
      border-radius:12px;
      background:black;
      color:white;
      cursor:pointer;
      z-index:999;
      display:none;
    }

    /* ---------- FOLDER ---------- */

    .folder{
      position:absolute;
      width:180px;
      min-height:130px;
      background:#d8c1b2;
      border-radius:18px;
      padding:12px;
      cursor:grab;
      user-select:none;
      box-shadow:0 5px 15px rgba(0,0,0,0.1);

      resize:both;
      overflow:auto;

      min-width:150px;
      min-height:110px;
    }

    .folder-top{
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    .folder-icon{
      width:42px;
      height:42px;
      border-radius:50%;
      background:white;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:20px;
    }

    .folder h3{
      margin-top:14px;
      font-size:18px;
      outline:none;
    }

    .folder p{
      margin-top:6px;
      font-size:13px;
      color:#555;
    }

    /* ---------- NOTE ---------- */

    .note{
      position:absolute;
      width:280px;
      min-height:180px;
      background:white;
      border-radius:18px;
      padding:15px;
      box-shadow:0 5px 15px rgba(0,0,0,0.08);

      resize:both;
      overflow:auto;

      min-width:220px;
      min-height:150px;
    }

    .note textarea{
      width:100%;
      height:100%;
      min-height:140px;
      border:none;
      resize:none;
      outline:none;
      font-size:15px;
      background:transparent;
    }

    /* ---------- TODO ---------- */

    .todo{
      position:absolute;
      width:320px;
      min-height:220px;
      background:white;
      border-radius:18px;
      padding:15px;
      box-shadow:0 5px 15px rgba(0,0,0,0.08);

      resize:both;
      overflow:auto;

      min-width:260px;
      min-height:200px;
    }

    .todo h2{
      margin-bottom:15px;
    }

    .todo-item{
      display:flex;
      align-items:center;
      gap:10px;
      margin-bottom:12px;
    }

    .todo-item input[type="text"]{
      width:100%;
      border:none;
      border-bottom:1px solid #ddd;
      outline:none;
      padding:5px;
    }

    .add-task-btn{
      margin-top:10px;
      border:none;
      background:black;
      color:white;
      padding:10px 14px;
      border-radius:10px;
      cursor:pointer;
    }

  </style>
</head>

<body>

  <button class="back-btn" onclick="goHome()">← Back</button>

  <div class="toolbar">

    <button class="tool-btn" onclick="createProject()">
      Project
    </button>

    <button class="tool-btn" onclick="createNote()">
      Note
    </button>

    <button class="tool-btn" onclick="createTodo()">
      To-do
    </button>

    <button class="tool-btn" onclick="downloadCurrentBoardPDF()">
      Export
    </button>

  </div>

  <div class="canvas">

    <div class="board-content" id="boardContent"></div>

  </div>

  <script>

    let currentBoard = "home";

    const boards = {
      home:[]
    };

    const boardContent = document.getElementById("boardContent");

    const backBtn = document.querySelector(".back-btn");

    function saveBoards(){

      localStorage.setItem(
        "trackerBoards",
        JSON.stringify(boards)
      );
    }

    function loadBoards(){

      const data = localStorage.getItem("trackerBoards");

      if(data){

        Object.assign(
          boards,
          JSON.parse(data)
        );
      }
    }

    loadBoards();

    function renderBoard(){

      boardContent.innerHTML = "";

      const items = boards[currentBoard];

      items.forEach((item)=>{

        /* ---------- FOLDER ---------- */

        if(item.type === "folder"){

          const folder = document.createElement("div");

          folder.className = "folder";

          folder.style.left = item.x + "px";
          folder.style.top = item.y + "px";

          folder.innerHTML = `

            <div class="folder-top">

              <div class="folder-icon">
                📁
              </div>

            </div>

            <h3 contenteditable="true">
              ${item.title}
            </h3>

            <p>
              ${boards[item.id]?.length || 0} items
            </p>
          `;

          const title = folder.querySelector("h3");

          title.oninput = () => {

            item.title = title.innerText;

            saveBoards();
          };

          folder.ondblclick = ()=>{

            currentBoard = item.id;

            renderBoard();
          };

          makeDraggable(folder,item);

          boardContent.appendChild(folder);
        }

        /* ---------- NOTE ---------- */

        if(item.type === "note"){

          const note = document.createElement("div");

          note.className = "note";

          note.style.left = item.x + "px";
          note.style.top = item.y + "px";

          note.innerHTML = `
            <textarea placeholder="Write something...">${item.text}</textarea>
          `;

          const textarea = note.querySelector("textarea");

          textarea.oninput = ()=>{

            item.text = textarea.value;

            saveBoards();
          };

          makeDraggable(note,item);

          boardContent.appendChild(note);
        }

        /* ---------- TODO ---------- */

        if(item.type === "todo"){

          const todo = document.createElement("div");

          todo.className = "todo";

          todo.style.left = item.x + "px";
          todo.style.top = item.y + "px";

          todo.innerHTML = `
            <h2>To do</h2>

            <div class="todo-list"></div>

            <button class="add-task-btn">
              Add Task
            </button>
          `;

          const list = todo.querySelector(".todo-list");

          function renderTasks(){

            list.innerHTML = "";

            item.tasks.forEach((task)=>{

              const row = document.createElement("div");

              row.className = "todo-item";

              row.innerHTML = `

                <input 
                  type="checkbox"
                  ${task.done ? "checked" : ""}
                >

                <input 
                  type="text"
                  value="${task.text}"
                  placeholder="Task..."
                >
              `;

              const checkbox =
              row.querySelector('input[type="checkbox"]');

              const text =
              row.querySelector('input[type="text"]');

              checkbox.onchange = ()=>{

                task.done = checkbox.checked;

                saveBoards();
              };

              text.oninput = ()=>{

                task.text = text.value;

                saveBoards();
              };

              list.appendChild(row);
            });
          }

          renderTasks();

          todo.querySelector(".add-task-btn").onclick = ()=>{

            item.tasks.push({
              text:"",
              done:false
            });

            renderTasks();

            saveBoards();
          };

          makeDraggable(todo,item);

          boardContent.appendChild(todo);
        }

      });

      backBtn.style.display =
      currentBoard === "home"
      ? "none"
      : "block";

      saveBoards();
    }

    /* ---------- CREATE PROJECT ---------- */

    function createProject(){

      const title = prompt("Project name");

      if(!title) return;

      const id = "board_" + Date.now();

      boards[id] = [];

      boards[currentBoard].push({

        type:"folder",

        title,

        id,

        x:150,

        y:150
      });

      renderBoard();
    }

    /* ---------- CREATE NOTE ---------- */

    function createNote(){

      if(currentBoard === "home"){

        alert("Open a project first");

        return;
      }

      boards[currentBoard].push({

        type:"note",

        text:"",

        x:200,

        y:200
      });

      renderBoard();
    }

    /* ---------- CREATE TODO ---------- */

    function createTodo(){

      if(currentBoard === "home"){

        alert("Open a project first");

        return;
      }

      boards[currentBoard].push({

        type:"todo",

        tasks:[],

        x:250,

        y:250
      });

      renderBoard();
    }

    /* ---------- GO HOME ---------- */

    function goHome(){

      currentBoard = "home";

      renderBoard();
    }

    /* ---------- EXPORT PDF ---------- */

    function exportBoardAsPDF(boardId, boardTitle){

      const boardData = boards[boardId];

      let html = `

        <div style="
          padding:30px;
          font-family:Arial;
        ">

          <h1>${boardTitle}</h1>

          <hr style="margin:20px 0;">
      `;

      boardData.forEach((item)=>{

        if(item.type === "note"){

          html += `

            <div style="
              margin-bottom:20px;
              padding:15px;
              border:1px solid #ddd;
              border-radius:10px;
            ">

              <h3>Note</h3>

              <p>
                ${item.text || "Empty note"}
              </p>

            </div>
          `;
        }

        if(item.type === "todo"){

          html += `

            <div style="
              margin-bottom:20px;
              padding:15px;
              border:1px solid #ddd;
              border-radius:10px;
            ">

              <h3>To Do</h3>
          `;

          item.tasks.forEach((task)=>{

            html += `

              <p style="margin-top:10px;">

                ${task.done ? "✅" : "⬜"}

                ${task.text || "Empty task"}

              </p>
            `;
          });

          html += `</div>`;
        }

      });

      html += `</div>`;

      const container =
      document.createElement("div");

      container.innerHTML = html;

      html2pdf()
      .from(container)
      .save(`${boardTitle}.pdf`);
    }

    /* ---------- EXPORT CURRENT BOARD ---------- */

    function downloadCurrentBoardPDF(){

      if(currentBoard === "home"){

        alert("Open a project first");

        return;
      }

      let projectTitle = "Project";

      boards.home.forEach((item)=>{

        if(item.id === currentBoard){

          projectTitle = item.title;
        }
      });

      exportBoardAsPDF(
        currentBoard,
        projectTitle
      );
    }

    /* ---------- DRAG SYSTEM ---------- */

    function makeDraggable(element,item){

      let isDragging = false;

      let offsetX;
      let offsetY;

      element.addEventListener("mousedown",(e)=>{

        if(
          e.target.tagName === "TEXTAREA" ||
          e.target.tagName === "INPUT" ||
          e.target.tagName === "BUTTON" ||
          e.target.isContentEditable
        ) return;

        isDragging = true;

        offsetX =
        e.clientX - element.offsetLeft;

        offsetY =
        e.clientY - element.offsetTop;

        element.style.cursor = "grabbing";
      });

      document.addEventListener("mousemove",(e)=>{

        if(!isDragging) return;

        item.x = e.clientX - offsetX;

        item.y = e.clientY - offsetY;

        element.style.left =
        item.x + "px";

        element.style.top =
        item.y + "px";
      });

      document.addEventListener("mouseup",()=>{

        isDragging = false;

        element.style.cursor = "grab";

        saveBoards();
      });
    }

    renderBoard();

  </script>

</body>
</html>
