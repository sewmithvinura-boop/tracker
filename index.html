<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Slice Everything Game</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
    }

    body{
        overflow:hidden;
        background:#111;
        font-family:Arial, sans-serif;
    }

    canvas{
        display:block;
        background:linear-gradient(to bottom,#1a1a1a,#000);
    }

    .score{
        position:absolute;
        top:20px;
        left:20px;
        color:white;
        font-size:32px;
        font-weight:bold;
        z-index:10;
    }

    .info{
        position:absolute;
        top:70px;
        left:20px;
        color:#aaa;
        font-size:16px;
    }
</style>
</head>
<body>

<div class="score">Score: <span id="score">0</span></div>
<div class="info">Drag mouse to slice objects</div>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let score = 0;

const scoreEl = document.getElementById("score");

const objects = [];
const particles = [];

let mouse = {
    x:0,
    y:0,
    isDown:false
};

const trail = [];

window.addEventListener("resize",()=>{
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});

canvas.addEventListener("mousedown",()=>{
    mouse.isDown = true;
});

canvas.addEventListener("mouseup",()=>{
    mouse.isDown = false;
    trail.length = 0;
});

canvas.addEventListener("mousemove",(e)=>{
    mouse.x = e.clientX;
    mouse.y = e.clientY;

    if(mouse.isDown){
        trail.push({x:mouse.x,y:mouse.y});

        if(trail.length > 10){
            trail.shift();
        }
    }
});

class FallingObject{
    constructor(){
        this.radius = Math.random() * 30 + 25;
        this.x = Math.random() * (canvas.width - this.radius*2) + this.radius;
        this.y = canvas.height + this.radius;

        this.speedY = Math.random() * -8 - 12;
        this.speedX = (Math.random() - 0.5) * 6;

        this.gravity = 0.25;

        this.color = `hsl(${Math.random()*360},80%,60%)`;

        this.sliced = false;
    }

    update(){
        this.x += this.speedX;
        this.y += this.speedY;

        this.speedY += this.gravity;
    }

    draw(){
        ctx.beginPath();
        ctx.fillStyle = this.color;
        ctx.arc(this.x,this.y,this.radius,0,Math.PI*2);
        ctx.fill();

        ctx.shadowBlur = 20;
        ctx.shadowColor = this.color;
    }
}

class Particle{
    constructor(x,y,color){
        this.x = x;
        this.y = y;

        this.size = Math.random() * 6 + 2;

        this.speedX = (Math.random()-0.5) * 10;
        this.speedY = (Math.random()-0.5) * 10;

        this.life = 100;

        this.color = color;
    }

    update(){
        this.x += this.speedX;
        this.y += this.speedY;

        this.life--;
    }

    draw(){
        ctx.fillStyle = this.color;
        ctx.globalAlpha = this.life / 100;

        ctx.beginPath();
        ctx.arc(this.x,this.y,this.size,0,Math.PI*2);
        ctx.fill();

        ctx.globalAlpha = 1;
    }
}

function createParticles(x,y,color){
    for(let i=0;i<20;i++){
        particles.push(new Particle(x,y,color));
    }
}

function spawnObject(){
    objects.push(new FallingObject());
}

setInterval(spawnObject,700);

function drawTrail(){
    if(trail.length < 2) return;

    ctx.beginPath();
    ctx.moveTo(trail[0].x,trail[0].y);

    for(let i=1;i<trail.length;i++){
        ctx.lineTo(trail[i].x,trail[i].y);
    }

    ctx.strokeStyle = "white";
    ctx.lineWidth = 5;
    ctx.shadowBlur = 20;
    ctx.shadowColor = "white";
    ctx.stroke();
}

function checkSlice(obj){

    for(let i=0;i<trail.length;i++){

        let dx = trail[i].x - obj.x;
        let dy = trail[i].y - obj.y;

        let distance = Math.sqrt(dx*dx + dy*dy);

        if(distance < obj.radius){

            createParticles(obj.x,obj.y,obj.color);

            score++;
            scoreEl.innerText = score;

            return true;
        }
    }

    return false;
}

function animate(){

    ctx.clearRect(0,0,canvas.width,canvas.height);

    for(let i=objects.length-1;i>=0;i--){

        const obj = objects[i];

        obj.update();
        obj.draw();

        if(checkSlice(obj)){
            objects.splice(i,1);
            continue;
        }

        if(obj.y > canvas.height + 200){
            objects.splice(i,1);
        }
    }

    for(let i=particles.length-1;i>=0;i--){

        particles[i].update();
        particles[i].draw();

        if(particles[i].life <= 0){
            particles.splice(i,1);
        }
    }

    drawTrail();

    requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
